<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生物学科普文章阅读体验调查</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  background: #f4f6fb;
  color: #1a1a2e;
  font-size: 16px;
  line-height: 1.8;
  min-height: 100vh;
}
.app-wrap { max-width: 760px; margin: 0 auto; padding: 0 0 90px; }
.screen { display: none; }
.screen.active { display: block; }
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 28px 24px;
  margin: 20px 16px;
}
.page-header {
  background: #1e3a8a;
  color: #fff;
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
}
.domain-tag {
  font-size: 12px;
  background: rgba(255,255,255,.2);
  border-radius: 4px;
  padding: 2px 8px;
  flex-shrink: 0;
}
.page-header h1 {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.progress-txt { font-size: 12px; color: #bfdbfe; flex-shrink: 0; }
.progress-bar-wrap { height: 4px; background: #dbeafe; }
.progress-bar-fill { height: 100%; background: #3b82f6; transition: width .4s ease; }
.cover-title { font-size: 26px; font-weight: 800; color: #1e3a8a; margin-bottom: 6px; }
.cover-sub { font-size: 16px; color: #6b7280; margin-bottom: 24px; }
.info-box {
  border-left: 4px solid #3b82f6;
  background: #eff6ff;
  padding: 14px 16px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 14px;
}
.info-box.warn { border-color: #f59e0b; background: #fffbeb; }
.info-box h3 { font-size: 14px; font-weight: 700; color: #1d4ed8; margin-bottom: 6px; }
.info-box.warn h3 { color: #b45309; }
.info-box p { font-size: 14px; color: #374151; }
.info-box.warn p { color: #78350f; }
.consent-line { margin-top: 10px; font-size: 14px; color: #78350f; display: flex; gap: 10px; flex-wrap: wrap; }
.consent-line label { white-space: nowrap; }
.consent-line input[type=text] {
  border: none;
  border-bottom: 1.5px solid #d97706;
  background: transparent;
  flex: 1;
  min-width: 120px;
  font-size: 14px;
  outline: none;
  color: #1a1a2e;
}
.form-group { margin-bottom: 22px; }
.form-label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
.req { color: #ef4444; }
.text-input {
  width: 100%;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
  background: #fafafa;
}
.text-input:focus { border-color: #3b82f6; background: #fff; }
.radio-grid, .check-grid { display: flex; flex-direction: column; gap: 8px; }
.radio-opt, .check-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  font-size: 15px;
}
.radio-opt:hover, .check-opt:hover { border-color: #93c5fd; background: #eff6ff; }
.radio-opt input, .check-opt input { accent-color: #3b82f6; width: 18px; height: 18px; flex-shrink:0; }
.radio-opt.selected, .check-opt.selected { border-color: #3b82f6; background: #eff6ff; }
.round-banner {
  background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
  color: #fff;
  padding: 32px 24px;
  border-radius: 12px;
  margin: 20px 16px;
  text-align: center;
}
.round-banner h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
.round-banner p { font-size: 14px; color: #bfdbfe; }
.article-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.art-tab {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid #d1d5db;
  font-size: 13px;
  cursor: pointer;
  background: #fff;
  transition: all .15s;
  font-family: inherit;
}
.art-tab.active { background: #1e3a8a; color: #fff; border-color: #1e3a8a; }
.art-tab.done { border-color: #10b981; color: #065f46; background: #ecfdf5; }
.article-panel { display: none; }
.article-panel.active { display: block; }
.article-title-bar {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 2px solid #e5e7eb;
}
.art-num {
  background: #1e3a8a;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  flex-shrink: 0;
  margin-top: 2px;
}
.article-title-bar h2 { font-size: 18px; font-weight: 700; color: #111827; line-height: 1.4; }
.article-body { color: #374151; }
.article-body p { margin-bottom: 14px; text-align: justify; }
.article-body h3 { font-size: 16px; font-weight: 700; margin: 20px 0 8px; color: #111; }
.article-body h4 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; color: #222; }
.article-body ul, .article-body ol { margin: 0 0 14px 22px; }
.article-body li { margin-bottom: 4px; }
.article-body strong { font-weight: 700; }
.art-nav-row { display: flex; justify-content: space-between; margin-top: 24px; gap: 10px; }
.read-confirm {
  background: #ecfdf5;
  border: 1.5px solid #10b981;
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
  cursor: pointer;
  font-size: 14px;
  color: #065f46;
  font-weight: 600;
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.read-confirm input { accent-color: #10b981; width: 18px; height: 18px; }
.read-confirm.checked { background: #d1fae5; }
.timer-box {
  margin: 0 16px 16px;
  padding: 12px 16px;
  border-radius: 10px;
  background: #f8fafc;
  border: 1.5px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 14px;
  color: #374151;
}
.timer-pill {
  background: #1f2937;
  color: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  min-width: 76px;
  text-align: center;
  font-weight: 700;
  letter-spacing: .02em;
}
.ref-module { border: 1.5px solid #d1d5db; border-radius: 10px; margin: 20px 16px 0; overflow: hidden; }
.ref-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: #f8fafc;
  cursor: pointer;
  user-select: none;
  border-bottom: 1.5px solid #e5e7eb;
}
.ref-header h3 { font-size: 14px; font-weight: 700; color: #374151; }
.ref-toggle-btn {
  font-size: 12px;
  background: #e0e7ff;
  color: #3730a3;
  border: none;
  border-radius: 5px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: inherit;
}
.ref-body { display: none; border-top: 1px solid #e5e7eb; }
.ref-body.open { display: block; }
.ref-art-item { border-bottom: 1px solid #f3f4f6; }
.ref-art-item:last-child { border-bottom: none; }
.ref-art-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 18px; cursor: pointer; background: #fff; transition: background .12s; }
.ref-art-hdr:hover { background: #f9fafb; }
.ref-art-num { font-size: 11px; font-weight: 700; background: #dbeafe; color: #1d4ed8; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.ref-art-title { font-size: 14px; font-weight: 600; color: #374151; flex: 1; }
.ref-art-arrow { color: #9ca3af; font-size: 13px; transition: transform .2s; flex-shrink: 0; }
.ref-art-arrow.open { transform: rotate(90deg); }
.ref-art-body { display: none; padding: 4px 18px 16px 18px; background: #fafafa; font-size: 13px; color: #4b5563; line-height: 1.7; }
.ref-art-body.open { display: block; }
.ref-art-body p { margin-bottom: 10px; text-align: justify; }
.ref-art-body h3 { font-size: 14px; font-weight: 700; margin: 12px 0 6px; }
.ref-art-body h4 { font-size: 13px; font-weight: 600; margin: 10px 0 4px; }
.ref-art-body ul, .ref-art-body ol { margin: 0 0 10px 18px; }
.survey-part-label { font-size: 18px; font-weight: 800; color: #1e3a8a; margin-bottom: 4px; }
.survey-part-desc { font-size: 13px; color: #6b7280; margin-bottom: 24px; font-style: italic; }
.sub-section { margin-bottom: 28px; }
.sub-title { font-size: 15px; font-weight: 700; color: #374151; margin-bottom: 4px; padding-left: 10px; border-left: 3px solid #3b82f6; }
.sub-desc { font-size: 12px; color: #9ca3af; margin-bottom: 14px; padding-left: 13px; }
.q-item { display: flex; gap: 12px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid #f3f4f6; }
.q-item:last-child { border-bottom: none; }
.q-num { font-size: 12px; font-weight: 700; color: #9ca3af; min-width: 34px; padding-top: 2px; flex-shrink: 0; }
.q-text { font-size: 14px; color: #1f2937; flex: 1; line-height: 1.6; }
.q-scale { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.scale-labels { display: flex; justify-content: space-between; font-size: 10px; color: #9ca3af; width: 100%; }
.scale-btns { display: flex; gap: 4px; }
.scale-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1.5px solid #d1d5db;
  background: #fff;
  font-size: 14px;
  font-weight: 600;
  color: #6b7280;
  cursor: pointer;
  transition: all .12s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}
.scale-btn:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
.scale-btn.selected { background: #1e3a8a; color: #fff; border-color: #1e3a8a; }
.q-item.unanswered .scale-btn { border-color: #fca5a5; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all .15s;
}
.btn-primary { background: #1e3a8a; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
.btn-outline { background: #fff; color: #374151; border: 1.5px solid #d1d5db; }
.btn-outline:hover { border-color: #6b7280; }
.btn-row { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; margin-top: 24px; }
.btn-row.center { justify-content: center; }
.complete-card { text-align: center; padding: 48px 24px; }
.complete-icon { font-size: 46px; margin-bottom: 16px; }
.complete-card h2 { font-size: 24px; font-weight: 800; color: #065f46; margin-bottom: 10px; }
.complete-card p { color: #6b7280; font-size: 15px; }
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1f2937;
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 999;
  transition: transform .3s ease;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }
.req-note { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
.req-note.show { display: block; }
@media (max-width: 560px) {
  body { font-size: 15px; }
  .card { margin: 14px 10px; padding: 22px 16px; }
  .round-banner { margin: 14px 10px; padding: 24px 16px; }
  .q-item { flex-direction: column; gap: 8px; }
  .q-scale { align-items: flex-start; width: 100%; }
  .scale-btns { width: 100%; justify-content: space-between; }
  .scale-btn { flex: 1; height: 40px; }
  .timer-box { margin: 0 10px 12px; flex-direction: column; align-items: flex-start; }
  .btn { width: 100%; }
  .art-nav-row { flex-direction: column; }
}
</style>
</head>
<body>
<div id="toast"></div>
<div class="page-header" id="pageHeader">
  <span class="domain-tag">生物学</span>
  <h1 id="headerTitle">科普文章阅读体验调查</h1>
  <span class="progress-txt" id="headerProgress"></span>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
<div class="app-wrap">
  <div id="s-cover" class="screen active">
    <div class="card" style="margin-top:30px">
      <div class="cover-title">科普文章阅读体验调查</div>
      <div class="cover-sub">生物学领域</div>
      <div class="info-box warn">
        <h3>监护人同意声明</h3>
        <p>本问卷面向18周岁以下未成年人。参与前须经监护人知情同意。</p>
        <div class="consent-line">
          <label>监护人签字：</label>
          <input type="text" id="guardianSig" placeholder="请输入监护人姓名">
          <label>日期：</label>
          <input type="text" id="consentDate" placeholder="如 2026-05-13">
        </div>
      </div>
      <div class="info-box">
        <h3>本次任务</h3>
        <p>您将先阅读 <strong>5 篇</strong>生物学领域的科普文章，阅读完成后回答 40 道量表题。</p>
      </div>
      <div class="info-box">
        <h3>评分说明</h3>
        <p>所有量表题使用 <strong>0-5 分</strong>（0=完全不符合，5=完全符合）。点击对应数字即可选择，可更改。</p>
      </div>
      <div class="info-box">
        <h3>隐私与数据</h3>
        <p>所有答案仅用于学术研究，严格保密，不与个人身份关联。</p>
      </div>
      <div class="btn-row center" style="margin-top:28px">
        <button class="btn btn-primary" onclick="startPartA()">开始填写 →</button>
      </div>
    </div>
  </div>

  <div id="s-partA" class="screen">
    <div class="round-banner" style="background:linear-gradient(135deg,#374151,#1f2937)">
      <h2>A &nbsp;基本信息</h2>
      <p>以下信息只需填写一次，全程保密</p>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">参与者编号 <span class="req">*</span></label>
        <input class="text-input" id="pid" type="text" placeholder="请输入研究员分配给您的编号">
        <div class="req-note" id="pid-err">请填写参与者编号</div>
      </div>
      <div class="form-group">
        <label class="form-label">Q01. 您的年龄是？ <span class="req">*</span></label>
        <input class="text-input" id="a_age" type="number" min="6" max="17" placeholder="请输入年龄（岁）">
      </div>
      <div class="form-group">
        <label class="form-label">Q02. 您的性别是？ <span class="req">*</span></label>
        <div class="radio-grid" id="rg-gender">
          <label class="radio-opt"><input type="radio" name="gender" value="男"> 男</label>
          <label class="radio-opt"><input type="radio" name="gender" value="女"> 女</label>
          <label class="radio-opt"><input type="radio" name="gender" value="其他"> 其他</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Q03. 您目前就读的年级是？ <span class="req">*</span></label>
        <div class="radio-grid" id="rg-grade">
          <label class="radio-opt"><input type="radio" name="grade" value="小学1-3年级"> 小学 1-3 年级</label>
          <label class="radio-opt"><input type="radio" name="grade" value="小学4-6年级"> 小学 4-6 年级</label>
          <label class="radio-opt"><input type="radio" name="grade" value="初中"> 初中</label>
          <label class="radio-opt"><input type="radio" name="grade" value="高中"> 高中</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Q04. 您是否经常阅读科普文章？ <span class="req">*</span></label>
        <div class="radio-grid" id="rg-read">
          <label class="radio-opt"><input type="radio" name="read_habit" value="是"> 是</label>
          <label class="radio-opt"><input type="radio" name="read_habit" value="否"> 否</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Q05. 您主要通过哪些渠道获取科普信息？（可多选）</label>
        <div class="check-grid">
          <label class="check-opt"><input type="checkbox" value="图文社交媒体"> 图文社交媒体</label>
          <label class="check-opt"><input type="checkbox" value="科普书籍"> 科普书籍</label>
          <label class="check-opt"><input type="checkbox" value="短视频"> 短视频</label>
          <label class="check-opt"><input type="checkbox" value="课堂/讲座"> 课堂 / 讲座</label>
          <label class="check-opt"><input type="checkbox" value="其他"> 其他</label>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitPartA()">确认，进入阅读 →</button>
      </div>
    </div>
  </div>

  <div id="dynamic-container"></div>

  <div id="s-done" class="screen">
    <div class="card complete-card">
      <div class="complete-icon">完成</div>
      <h2>全部完成！感谢您的参与</h2>
      <p style="margin-top:8px">您已完成阅读与答题。</p>
      <p style="margin-top:20px;font-size:14px;color:#9ca3af">数据正在提交，请稍候……</p>
      <div id="submit-status" style="margin-top:16px;font-size:14px"></div>
    </div>
  </div>
</div>

<script>
const DOMAIN = "biology";
const DOMAIN_CN = "生物学";
const ARTICLES = [{"title": "什么是 CRISPR 基因编辑技术？", "html": "<p>大家好，今天我要和大家分享的是一个非常神奇的科学领域——基因编辑技术。首先，什么是基因呢？基因是DNA分子上携带遗传信息的片段，它们像一本“生命说明书”，决定了我们长什么样子、能干什么。就像一个小镇的规划图纸，基因指导着细胞如何建造和运作。</p><p>接下来，让我们来认识CRISPR基因编辑技术。它的基础原理源于细菌的免疫机制，科学家在2012年左右首次将其改造为高效的基因编辑工具。CRISPR可以帮助科学家像编辑文章一样，精确地修改基因中的“错误”。想象一下，如果你在写一篇文章时，发现某个字写错了，你不会把整篇文章都重写，而是找到那个错误的地方直接修改。这就是CRISPR的作用——当然，实际过程比这复杂得多，需要精密的分子工具配合。</p><p>CRISPR技术的好处很多，它有望帮助我们治疗一些遗传性疾病，也可以帮助作物更好地生长。不过，这项技术仍在发展中，科学家们正在努力解决潜在问题，比如避免意外修改其他基因（即“脱靶效应”）。就像一位能工巧匠，CRISPR能修补细胞中的“小破洞”，但需要谨慎操作，才能让生命之树更加茁壮成长。所以，CRISPR基因编辑技术不仅听起来高大上，还有望在严格监管下，实实在在地改善我们的生活。</p>", "index": 7}, {"title": "人类的免疫系统是如何识别外来病原体的？", "html": "<p>亲爱的朋友们，今天我们来聊聊一个神奇的秘密——人类的免疫系统是如何识别外来病原体的。想象一下，我们的身体就像一座宏伟的城堡，而免疫系统就是守护这座城堡的勇士。城堡周围有一条宽阔的护城河，但别误会，这条河并不是淋巴系统——淋巴系统更像是城堡内部的情报网络，负责传递信息并运送士兵。</p><p>在城堡的大门前，有一道坚固的城墙——我们的皮肤。它像一道屏障，阻挡大多数不受欢迎的访客（外来病原体）进入。如果有些病原体试图强行突破，皮肤细胞会释放信号，就像发出警报，召集其他士兵前来支援。</p><p>城堡内部有很多房间，每个房间都有自己的守卫，这些守卫就是免疫细胞，包括白细胞和巨噬细胞。它们像巡逻的士兵一样，在城堡中四处游走，寻找可疑的入侵者。一旦发现陌生人，免疫细胞会迅速行动：有的用抗体标记敌人，有的直接吞噬敌人，还有的释放杀菌分子，确保城堡的安全。</p><p>此外，我们的身体还会记住那些曾经入侵过的敌人，以便下次它们再出现时能够更快地做出反应。这种记忆功能就像是城堡的档案室，储存着所有过往访客的信息，帮助我们更好地保护自己。</p><p>通过这样的机制，我们的免疫系统不仅能够抵御病毒和细菌的入侵，还能适应不断变化的威胁，保护我们免受疾病的侵害。所以，小朋友，下次当你听到关于免疫系统的讨论时，你可以自豪地说：“我了解免疫系统的奥秘！”</p>", "index": 22}, {"title": "什么是生态系统？", "html": "<p>亲爱的朋友们，你们好！今天我要和大家一起认识一个新的词语——生态系统。简单来说，生态系统是生物群落与其非生物环境相互作用形成的统一整体，就像我们家庭里的大家庭一样：生物是成员，环境是大家庭的住所，生物和环境之间相互依存，共同维持着生命活动的平衡。</p><p>比如说，森林就是一个非常重要的生态系统。森林中的树木、鸟类、昆虫等生物组成了大家庭的成员，土壤、水等环境因素则是大家庭的住所。树木通过光合作用产生氧气，供动物呼吸；鸟类会捕食害虫，保护树木；昆虫则帮助植物传粉，促进繁殖。而阳光、雨水等环境因素则提供了生长所需的能量和水分。这种相互依存的关系，就像家庭成员之间的亲情，使得森林这个大家庭能够健康、持续地发展。</p><p>此外，生态系统中的各个组成部分并不是孤立存在的，它们之间存在着复杂的相互作用，包括合作、竞争和捕食等。就像我们家庭中，每个人都会互相帮助、互相照顾一样，生物之间也会通过多种方式共同维护生态平衡。因此，保护生态系统就是保护我们共同的家园，让我们的地球更加美好！</p><p>好了，今天的科普就到这里，大家有什么问题可以随时提问哦。记得多关注生态环境哦！</p>", "index": 30}, {"title": "为什么我们会打喷嚏？", "html": "<p>为什么我们会打喷嚏？</p><p>小朋友，你知道吗？当我们打喷嚏的时候，鼻子会突然喷出一股气流，有时还会带出一些液体。这其实是身体在帮我们清理鼻子呢！</p><p>当你感到鼻子里有灰尘、花粉或者细菌时，你的鼻子就会发出“警报”，然后身体会用力打一个喷嚏。这个喷嚏就像一阵强风，能把那些讨厌的小东西从鼻子里赶出去。所以，打喷嚏是一种保护性反应，能帮助我们清除鼻腔里的异物，减少病菌进入身体的机会。</p><p>如果鼻子里有东西堵着，打喷嚏也能帮我们把它排出来。打完喷嚏后，鼻子通常会感觉更通畅、更舒服，因为刺激物被清走了。</p><p>所以，小朋友，下次当你打喷嚏的时候，可以告诉你的家人：“我的鼻子在打‘小风暴’呢！”它正在帮你清理鼻腔，保护你少生病哦！</p>", "index": 41}, {"title": "什么是基因表达？", "html": "<p>亲爱的小朋友，你知道吗？我们的身体里藏着很多神奇的小东西，它们叫做基因。基因就像一本巨大的说明书，里面写满了我们从小到大的成长秘密。不过，基因自己不会直接工作，它需要先“翻译”成一种叫蛋白质的小帮手，才能让身体动起来。这个过程，科学家就叫它“基因表达”。</p><p>想象一下，你有一本画满有趣图画的书，但如果你看不见这些图画，那这本书就没什么用处。同样地，基因里的信息也需要“翻译”成蛋白质，才能告诉身体该做什么。这就像你在学校里学到的知识，只有通过练习变成自己的本领，才能真正用起来。</p><p>基因表达就像身体在执行各种任务。不同的基因表达会带来不同的效果。比如，眼睛里的基因表达，帮助我们看清五彩的世界；耳朵里的基因表达，让我们听到美妙的音乐；还有免疫系统的基因表达，它像小卫士一样，帮我们抵抗病菌，保护健康。</p><p>小朋友们，基因表达是身体生命活动的基础，了解它可以帮助我们更好地认识自己。现在，你是不是觉得身体里的这些“小说明书”很神奇呢？</p>", "index": 42}];

是否给您留下了严谨、可信的印象。", "qs": [[33, "我认为文章中的科学知识是可靠的。"], [34, "文章对不确定的内容保持了适度的谨慎，没有过度夸大。"], [35, "文章在传达科学知识的同时，没有让我感到被灌输或强迫接受。"], [36, "文章中有些表述让我对其科学准确性产生了疑虑。"]]}, {"id": "D3", "title": "D3 持续阅读意愿", "desc": "考察文章是否激发了您进一步了解该主题的意愿。", "qs": [[37, "阅读后，我对该主题产生了进一步了解的兴趣。"], [38, "我愿意在未来继续阅读有关这一主题的类似文章。"], [39, "我愿意将这组文章推荐给与我情况相似的朋友。"], [40, "读完这组文章后，我觉得没有必要再进一步了解这些话题了。"]]}]}};
const FORMSPREE_ENDPOINT = "https://formspree.io/f/xgordeqb";
const TOTAL_STEPS = 6;
const MIN_READ_SECONDS = 60;

const state = {
  pid: "", age: "", gender: "", grade: "", readHabit: "", channels: [],
  guardianSig: "", consentDate: "",
  artTab: 0,
  artRead: [false, false, false, false, false],
  readStart: 0,
  timerId: null,
  timeReady: false,
  answers: { B: {}, C: {}, D: {} }
};

function pad2(n) { return String(n).padStart(2, '0'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setProgress(step) {
  const pct = Math.round(step / TOTAL_STEPS * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('headerProgress').textContent = pct + '%';
}

function setHeaderTitle(title) {
  document.getElementById('headerTitle').textContent = title;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function startPartA() {
  const sig = document.getElementById('guardianSig').value.trim();
  const date = document.getElementById('consentDate').value.trim();
  if (!sig || !date) {
    toast('请先填写监护人签字和日期');
    return;
  }
  state.guardianSig = sig;
  state.consentDate = date;
  showScreen('s-partA');
  setHeaderTitle('A 基本信息');
  setProgress(1);
}

function submitPartA() {
  const pid = document.getElementById('pid').value.trim();
  const age = document.getElementById('a_age').value.trim();
  const gender = document.querySelector('input[name=gender]:checked');
  const grade = document.querySelector('input[name=grade]:checked');
  const readHabit = document.querySelector('input[name=read_habit]:checked');
  document.getElementById('pid-err').classList.toggle('show', !pid);
  if (!pid || !age || !gender || !grade || !readHabit) {
    toast('请完成所有必填基本信息');
    return;
  }
  state.pid = pid;
  state.age = age;
  state.gender = gender.value;
  state.grade = grade.value;
  state.readHabit = readHabit.value;
  state.channels = [...document.querySelectorAll('.check-opt input:checked')].map(i => i.value);
  startReading();
}

function buildArticleScreen() {
  const tabs = ARTICLES.map((art, i) => `
    <button class="art-tab${i===0?' active':''}" id="tab-a${i}" onclick="switchArtTab(${i})">${i+1}</button>
  `).join('');
  const panels = ARTICLES.map((art, i) => `
    <div class="article-panel${i===0?' active':''}" id="panel-a${i}">
      <div class="article-title-bar">
        <span class="art-num">第 ${i+1} 篇</span>
        <h2>${esc(art.title)}</h2>
      </div>
      <div class="article-body">${art.html}</div>
      <label class="read-confirm" id="confirm-a${i}">
        <input type="checkbox" id="chk-a${i}" onchange="markRead(${i})">
        我已认真阅读完这篇文章
      </label>
      <div class="art-nav-row">
        ${i>0 ? `<button class="btn btn-outline" onclick="switchArtTab(${i-1})">← 上一篇</button>` : '<span></span>'}
        ${i<4 ? `<button class="btn btn-primary" onclick="switchArtTab(${i+1})">下一篇 →</button>` : `<button class="btn btn-primary" id="go-survey" onclick="goToSurvey()" disabled>开始答题 →</button>`}
      </div>
    </div>
  `).join('');
  return `
    <div id="s-reading" class="screen">
      <div class="round-banner">
        <h2>阅读材料</h2>
        <p>请认真阅读以下 5 篇文章，每篇读完后勾选“我已认真阅读完这篇文章”</p>
      </div>
      <div class="timer-box">
        <span id="timerText">请至少阅读 60 秒，读完全部文章后进入答题。</span>
        <span class="timer-pill" id="timerPill">01:00</span>
      </div>
      <div class="card">
        <div class="article-nav">${tabs}</div>
        ${panels}
      </div>
    </div>`;
}

function buildSurveyScreen(part) {
  const s = QUESTIONS[part];
  const refItems = ARTICLES.map((art, i) => `
    <div class="ref-art-item">
      <div class="ref-art-hdr" onclick="toggleRefArt(this)">
        <span class="ref-art-num">文章 ${i+1}</span>
        <span class="ref-art-title">${esc(art.title)}</span>
        <span class="ref-art-arrow">▶</span>
      </div>
      <div class="ref-art-body">${art.html}</div>
    </div>
  `).join('');
  const subHtml = s.subs.map(sub => `
    <div class="sub-section">
      <div class="sub-title">${sub.title}</div>
      <div class="sub-desc">${sub.desc}</div>
      ${sub.qs.map(([qn, qt]) => `
        <div class="q-item" id="qi-${part}-${qn}">
          <span class="q-num">Q${pad2(qn)}</span>
          <span class="q-text">${esc(qt)}</span>
          <div class="q-scale">
            <div class="scale-labels"><span>完全不符合</span><span>完全符合</span></div>
            <div class="scale-btns">
              ${[0,1,2,3,4,5].map(v => `<button class="scale-btn" data-part="${part}" data-q="${qn}" data-v="${v}" onclick="selectScale(this)">${v}</button>`).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
  const prev = part === 'B' ? 's-reading' : part === 'C' ? 's-survey-B' : 's-survey-C';
  const nextBtn = part === 'B'
    ? `<button class="btn btn-primary" onclick="goToNextPart('B','C')">C 部分 →</button>`
    : part === 'C'
      ? `<button class="btn btn-primary" onclick="goToNextPart('C','D')">D 部分 →</button>`
      : `<button class="btn btn-primary" onclick="finishSurvey()">完成全部，提交答卷 →</button>`;
  return `
    <div id="s-survey-${part}" class="screen">
      <div class="ref-module">
        <div class="ref-header" onclick="toggleRefPanel(this)">
          <h3>阅读文章回忆预览（共5篇）</h3>
          <button class="ref-toggle-btn" onclick="event.stopPropagation();expandAllRef(this)">展开全部</button>
        </div>
        <div class="ref-body">${refItems}</div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="survey-part-label">${s.title}</div>
        <div class="survey-part-desc">${s.desc}</div>
        ${subHtml}
        <div class="btn-row">
          <button class="btn btn-outline" onclick="showScreen('${prev}')">← 返回</button>
          ${nextBtn}
        </div>
      </div>
    </div>`;
}

function buildScreens() {
  document.getElementById('dynamic-container').innerHTML =
    buildArticleScreen() + buildSurveyScreen('B') + buildSurveyScreen('C') + buildSurveyScreen('D');
}

function startReading() {
  if (!state.readStart) {
    state.readStart = Date.now();
    startTimer();
  }
  showScreen('s-reading');
  setHeaderTitle('阅读材料');
  setProgress(2);
}

function startTimer() {
  updateTimer();
  state.timerId = setInterval(updateTimer, 1000);
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - state.readStart) / 1000);
  const remain = Math.max(0, MIN_READ_SECONDS - elapsed);
  state.timeReady = remain === 0;
  document.getElementById('timerPill').textContent = formatTime(remain);
  document.getElementById('timerText').textContent = state.timeReady
    ? '已满足最短阅读时间要求。请确认读完全部文章后开始答题。'
    : '请至少阅读 60 秒，读完全部文章后进入答题。';
  updateSurveyButton();
  if (state.timeReady && state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return pad2(m) + ':' + pad2(s);
}

function switchArtTab(i) {
  state.artTab = i;
  for (let j=0; j<ARTICLES.length; j++) {
    const tab = document.getElementById(`tab-a${j}`);
    const panel = document.getElementById(`panel-a${j}`);
    if (!tab || !panel) continue;
    tab.className = 'art-tab' + (j===i?' active':'') + (state.artRead[j]?' done':'');
    panel.classList.toggle('active', j===i);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function markRead(i) {
  const chk = document.getElementById(`chk-a${i}`);
  const confirm = document.getElementById(`confirm-a${i}`);
  state.artRead[i] = chk.checked;
  confirm.classList.toggle('checked', chk.checked);
  const tab = document.getElementById(`tab-a${i}`);
  if (tab) tab.classList.toggle('done', chk.checked);
  updateSurveyButton();
}

function updateSurveyButton() {
  const btn = document.getElementById('go-survey');
  if (!btn) return;
  const allRead = state.artRead.every(Boolean);
  btn.disabled = !(allRead && state.timeReady);
  if (!allRead) btn.textContent = '请先确认读完全部文章';
  else if (!state.timeReady) btn.textContent = '请等待计时结束';
  else btn.textContent = '开始答题 →';
}

function goToSurvey() {
  if (!state.artRead.every(Boolean)) { toast('请先读完并确认所有5篇文章'); return; }
  if (!state.timeReady) { toast('请满足 60 秒最短阅读时间要求'); return; }
  showScreen('s-survey-B');
  setHeaderTitle('B 认知负荷');
  setProgress(3);
}

function selectScale(btn) {
  const part = btn.dataset.part, q = +btn.dataset.q, v = +btn.dataset.v;
  state.answers[part][q] = v;
  const qi = document.getElementById(`qi-${part}-${q}`);
  qi.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('selected', +b.dataset.v === v));
  qi.classList.remove('unanswered');
}

function validatePart(part) {
  let ok = true;
  QUESTIONS[part].subs.forEach(sub => {
    sub.qs.forEach(([qn]) => {
      const answered = state.answers[part][qn] !== undefined;
      const qi = document.getElementById(`qi-${part}-${qn}`);
      if (qi) qi.classList.toggle('unanswered', !answered);
      if (!answered) ok = false;
    });
  });
  return ok;
}

function goToNextPart(fromPart, toPart) {
  if (!validatePart(fromPart)) {
    toast('请完成本页所有量表题后再继续');
    const first = document.querySelector('.q-item.unanswered');
    if (first) first.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  showScreen(`s-survey-${toPart}`);
  setHeaderTitle(QUESTIONS[toPart].title);
  setProgress(toPart === 'C' ? 4 : 5);
}

function finishSurvey() {
  if (!validatePart('D')) {
    toast('请完成本页所有量表题后再继续');
    const first = document.querySelector('.q-item.unanswered');
    if (first) first.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  showScreen('s-done');
  setHeaderTitle('提交完成');
  setProgress(6);
  submitToFormspree();
}

function toggleRefPanel(hdr) {
  const body = hdr.nextElementSibling;
  body.classList.toggle('open');
  const btn = hdr.querySelector('.ref-toggle-btn');
  if (btn) btn.textContent = body.classList.contains('open') ? '收起面板' : '展开全部';
}

function expandAllRef(btn) {
  const body = btn.closest('.ref-module').querySelector('.ref-body');
  const allOpen = [...body.querySelectorAll('.ref-art-body')].every(b => b.classList.contains('open'));
  body.classList.add('open');
  body.querySelectorAll('.ref-art-body').forEach(b => b.classList.toggle('open', !allOpen));
  body.querySelectorAll('.ref-art-arrow').forEach(a => a.classList.toggle('open', !allOpen));
  btn.textContent = allOpen ? '展开全部' : '收起全部';
}

function toggleRefArt(hdr) {
  const body = hdr.nextElementSibling;
  const arrow = hdr.querySelector('.ref-art-arrow');
  const open = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

function buildPayload() {
  const data = {
    页面版本: 'revised_child_standalone',
    领域代码: DOMAIN,
    领域: DOMAIN_CN,
    参与者编号: state.pid,
    年龄: state.age,
    性别: state.gender,
    年级: state.grade,
    是否常读科普: state.readHabit,
    获取渠道: state.channels.join('，'),
    监护人签字: state.guardianSig,
    同意日期: state.consentDate,
    阅读用时秒: Math.floor((Date.now() - state.readStart) / 1000),
    文章标题: ARTICLES.map((a, i) => `${i+1}.${a.title}`).join(' | ')
  };
  ['B','C','D'].forEach(part => {
    QUESTIONS[part].subs.forEach(sub => {
      sub.qs.forEach(([qn]) => {
        data[`${part}Q${pad2(qn)}`] = state.answers[part][qn] ?? '';
      });
    });
  });
  return data;
}

async function submitToFormspree() {
  const statusEl = document.getElementById('submit-status');
  try {
    const resp = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(buildPayload())
    });
    if (resp.ok) {
      statusEl.innerHTML = '<span style="color:#065f46;font-weight:600">数据已成功提交！感谢您的参与。</span>';
    } else {
      statusEl.innerHTML = `<span style="color:#dc2626">提交失败（${resp.status}），请截图此页面发送给研究员。</span>`;
    }
  } catch(e) {
    statusEl.innerHTML = '<span style="color:#dc2626">网络错误，请检查网络后刷新页面重试，或截图发给研究员。</span>';
    console.error(e);
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.querySelectorAll('.radio-opt input, .check-opt input').forEach(inp => {
  inp.addEventListener('change', () => {
    const group = inp.closest('.radio-grid, .check-grid');
    if (inp.type === 'radio') {
      group.querySelectorAll('.radio-opt').forEach(o => o.classList.remove('selected'));
      inp.closest('.radio-opt').classList.add('selected');
    } else {
      inp.closest('.check-opt').classList.toggle('selected', inp.checked);
    }
  });
});

buildScreens();
setProgress(0);
</script>
</body>
</html>
